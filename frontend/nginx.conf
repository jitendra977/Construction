# ── Rate limiting zones (defined at http level via include) ──────────────────
# limit_req_zone is declared here so it applies before the server block.
# NOTE: These directives work at the nginx http{} context.
# In most Docker/NPM setups this file is included inside http{} automatically.
limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ──────────────────────────────────────────────
    location / {
        limit_req zone=general burst=80 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ── Media files (shared Docker volume) ───────────────────────
    location /media/ {
        root /usr/share/nginx/html;
        autoindex off;   # SECURITY: never expose directory listings of user uploads
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── API — rate-limited ────────────────────────────────────────
    # The backend is proxied upstream (by Nginx Proxy Manager).
    # These locations apply rate limits at the Nginx layer before
    # requests even reach Gunicorn.
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;
        # Proxy handled by upstream NPM — just enforce rate here
        try_files $uri @fallback;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;
        try_files $uri @fallback;
    }

    location @fallback {
        return 404;
    }

    client_max_body_size 50M;

    # ── Static asset caching ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        limit_req zone=general burst=100 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                              always;
    add_header X-Content-Type-Options   "nosniff"                                 always;
    add_header X-XSS-Protection         "1; mode=block"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"         always;
    add_header Permissions-Policy       "geolocation=(self), microphone=(), camera=(self)" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.construction.nishanaweb.cloud wss://api.construction.nishanaweb.cloud ws://nishanaweb.cloud:9001 wss://nishanaweb.cloud:9001 ws://148.230.97.39:9001 wss://148.230.97.39:9001 ws://localhost:* ws://127.0.0.1:* ws://mqtt:*; frame-ancestors 'self';" always;
    # Uncomment after confirming HTTPS is fully stable:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    error_page 404 /index.html;
    error_page 429 @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"detail":"Too many requests. Please slow down."}';
    }
}
