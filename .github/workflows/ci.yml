name: CI / CD

on:
  push:
    branches:
      - main        # deploy on merge to main
      - dev         # tests only on dev branch
  pull_request:
    branches:
      - main        # tests run on every PR targeting main
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to VPS after tests pass?'
        required: true
        default: 'yes'
        type: choice
        options: ['yes', 'no']

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend — Django checks + pytest
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      # No DB_NAME → settings.py falls back to SQLite automatically
      SECRET_KEY: ci-insecure-key-only-for-testing
      DEBUG: "True"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Run migrations (SQLite)
        run: python manage.py migrate --run-syncdb

      - name: Run pytest
        run: pytest

      # Export the DRF Spectacular OpenAPI schema so the frontend team can
      # always download the latest schema from the CI run artifacts page.
      - name: Export OpenAPI schema
        run: python manage.py spectacular --color --file schema.yml

      - name: Upload schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: backend/schema.yml
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Frontend — ESLint + Vite build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Bun)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        run: bun run lint

      - name: Build (Vite)
        run: bun run build

  # ─────────────────────────────────────────────────────────────
  # Deploy — SSH into VPS (only on push to main or manual trigger)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'yes')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REMOTE_PROJECT_DIR: ${{ secrets.REMOTE_PROJECT_DIR || '/home/nishanaweb/project/Construction' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REMOTE_PROJECT_DIR
          script: |
            set -e
            : "${REMOTE_PROJECT_DIR:?REMOTE_PROJECT_DIR is required}"
            cd "$REMOTE_PROJECT_DIR"
            echo "── Pulling latest code ──"
            git pull origin main
            echo "── Building images ──"
            make build
            echo "── Starting containers ──"
            make up
            echo "── Running migrations ──"
            make migrate
            echo "── Collecting static files ──"
            make collectstatic
            echo "── Deploy complete ──"
            make ps

      - name: Verify deployment health
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL || 'https://api.construction.nishanaweb.cloud/api/v1/health/' }}
        run: |
          sleep 15
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$HEALTHCHECK_URL" \
            --max-time 30) || STATUS="000"
          echo "Health check URL: $HEALTHCHECK_URL"
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS) — deployment may be broken"
            exit 1
          fi
          echo "✅ Deployment healthy"
