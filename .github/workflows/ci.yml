name: CI / CD

on:
  push:
    branches:
      - main        # deploy on merge to main
      - dev         # tests only on dev branch
  pull_request:
    branches:
      - main        # tests run on every PR targeting main
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to VPS after tests pass?'
        required: true
        default: 'yes'
        type: choice
        options: ['yes', 'no']

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend — Django checks + pytest
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.9)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      # No DB_NAME → settings.py falls back to SQLite automatically
      SECRET_KEY: ci-insecure-key-only-for-testing
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Run migrations (SQLite)
        run: python manage.py migrate --run-syncdb

      - name: Run pytest
        run: pytest

  # ─────────────────────────────────────────────────────────────
  # Frontend — ESLint + Vite build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # Using npm install because package-lock.json is not yet committed.
        # Once you run `npm install` locally and commit package-lock.json,
        # switch this to `npm ci` for faster, reproducible installs.
        run: npm install

      - name: Lint (ESLint)
        # continue-on-error: true until pre-existing lint issues are resolved (Phase 3)
        # Remove continue-on-error once lint is clean
        continue-on-error: true
        run: npm run lint

      - name: Build (Vite)
        run: npm run build

  # ─────────────────────────────────────────────────────────────
  # Deploy — SSH into VPS and run update (only on push to main)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [backend, frontend]   # only runs if both jobs pass
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'yes')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/nishanaweb/project/Construction
            echo "── Pulling latest code ──"
            git pull origin main
            echo "── Building images ──"
            make build
            echo "── Starting containers ──"
            make up
            echo "── Running migrations ──"
            make migrate
            echo "── Collecting static files ──"
            make collectstatic
            echo "── Deploy complete ──"
            make ps
