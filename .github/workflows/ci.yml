name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend — Django checks + pytest
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.9)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      # No DB_NAME → settings.py falls back to SQLite automatically
      SECRET_KEY: ci-insecure-key-only-for-testing
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Run migrations (SQLite)
        run: python manage.py migrate --run-syncdb

      - name: Run pytest
        run: pytest

  # ─────────────────────────────────────────────────────────────
  # Frontend — ESLint + Vite build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # Using npm install because package-lock.json is not yet committed.
        # Once you run `npm install` locally and commit package-lock.json,
        # switch this to `npm ci` for faster, reproducible installs.
        run: npm install

      - name: Lint (ESLint)
        # continue-on-error: true until pre-existing lint issues are resolved (Phase 3)
        # Remove continue-on-error once lint is clean
        continue-on-error: true
        run: npm run lint

      - name: Build (Vite)
        run: npm run build
