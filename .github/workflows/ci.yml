name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend — Django checks + pytest
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      # No DB_NAME → settings.py falls back to SQLite automatically
      SECRET_KEY: ci-insecure-key-only-for-testing
      DEBUG: "True"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Run migrations (SQLite)
        run: python manage.py migrate --run-syncdb

      - name: Run pytest
        run: pytest

      # Export the DRF Spectacular OpenAPI schema so the frontend team can
      # always download the latest schema from the CI run artifacts page.
      - name: Export OpenAPI schema
        run: python manage.py spectacular --color --file schema.yml

      - name: Upload schema artifact
        uses: actions/upload-artifact@v6
        with:
          name: openapi-schema
          path: backend/schema.yml
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Backend schema drift guard
  # ─────────────────────────────────────────────────────────────
  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ci-insecure-key-only-for-testing
      DEBUG: "True"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

  # ─────────────────────────────────────────────────────────────
  # Frontend — ESLint + Vite build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Bun)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        run: bun run lint

      - name: Build (Vite)
        run: bun run build
